name: Build Calculator

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pylint pyinstaller # Added pytest here

      - name: Run Tests
        run: |
          pytest -v # This will look for your test_*.py files and run them

      - name: Run Pylint
        run: |
          pylint calculator.py calculator_logic.py --fail-under-8.0

      - name: Build Executable
        run: |
          pyinstaller --onefile --windowed calculator.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-EXE
          path: dist/calculator.exe